<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 24px;
            font-size: 28px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #5568d3;
        }

        .habit-list {
            list-style: none;
        }

        .habit-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .habit-item:hover {
            border-color: #e0e0e0;
        }

        .habit-item.completed {
            background: #f8f9fa;
            opacity: 0.7;
        }

        .habit-item.completed .habit-text {
            text-decoration: line-through;
            color: #999;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
        }

        .habit-text {
            flex: 1;
            font-size: 16px;
            color: #333;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 32px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Habit Tracker</h1>
        
        <div class="input-group">
            <input type="text" id="habitInput" placeholder="Add a new habit...">
            <button onclick="addHabit()">Add</button>
        </div>

        <ul class="habit-list" id="habitList"></ul>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('habits') || '[]');

        function renderHabits() {
            const list = document.getElementById('habitList');
            
            if (habits.length === 0) {
                list.innerHTML = '<div class="empty-state">No habits yet. Add one above!</div>';
                return;
            }

            list.innerHTML = habits.map((habit, index) => `
                <li class="habit-item ${habit.completed ? 'completed' : ''}">
                    <input type="checkbox" 
                           ${habit.completed ? 'checked' : ''} 
                           onchange="toggleHabit(${index})">
                    <span class="habit-text">${habit.text}</span>
                </li>
            `).join('');
        }

        function addHabit() {
            const input = document.getElementById('habitInput');
            const text = input.value.trim();
            
            if (text) {
                habits.push({ text, completed: false });
                input.value = '';
                saveHabits();
                renderHabits();
            }
        }

        function toggleHabit(index) {
            habits[index].completed = !habits[index].completed;
            saveHabits();
            renderHabits();
        }

        function saveHabits() {
            localStorage.setItem('habits', JSON.stringify(habits));
        }

        // Allow Enter key to add habit
        document.getElementById('habitInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addHabit();
            }
        });

        // Initial render
        renderHabits();
    </script>
</body>
</html>
