<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <style>
      /* Critical inline styles — page renders immediately with these */
      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
      body{background:#0f0f0f;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
      a{color:#6c63ff;text-decoration:none}
      .navbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(15,15,15,0.95);border-bottom:1px solid #2a2a2a}
      .nav-brand{font-size:1.35rem;font-weight:700;color:#f0f0f0}
      .nav-links{display:flex;gap:1.5rem}
      .nav-link{color:#a0a0a0;font-weight:500;font-size:0.95rem;transition:color 0.25s}
      .nav-link:hover,.nav-link.active{color:#f0f0f0}
      .page-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:5rem 2rem 4rem;position:relative;overflow:hidden}
      .page-hero h1{font-size:clamp(2.5rem,6vw,4rem);font-weight:700;line-height:1.1;margin-bottom:1rem}
      .page-hero p{font-size:1.15rem;color:#a0a0a0;max-width:540px}
    </style>
    <!-- Non-blocking Google Font load -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
  </head>
  <body>
    <noscript>
      <div style="padding:4rem 2rem;text-align:center;max-width:800px;margin:0 auto">
        <h1 style="font-size:3rem;margin-bottom:1rem">Hi, I'm Alex</h1>
        <p style="font-size:1.2rem;color:#a0a0a0;margin-bottom:2rem;line-height:1.6">I design and build thoughtful digital experiences — blending clean code with bold ideas to ship products people love.</p>
        <p><a href="/projects" style="margin-right:1rem">→ View My Work</a><a href="/about" style="margin-right:1rem">→ About</a><a href="/contact">→ Contact</a></p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
